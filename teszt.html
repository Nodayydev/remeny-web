<style>
    html {
        scroll-behavior: smooth;
    }

    body {
        overflow-x: hidden;
        font-variant-caps: small-caps;
        background: #020617 !important;
    }

    * {
        font-variant-caps: small-caps;
    }

    .small-caps {
        font-variant-caps: small-caps;
    }

    /* Szöveges kivételek (ahol nem szeretnénk Small-Caps formázást) */
    .normal-text,
    .normal-text *,
    #minecraft-name,
    #player-name-display,
    #player-status,
    .server-strip-ip,
    .server-strip-motd {
        font-variant-caps: normal !important;
        text-transform: none !important;
        letter-spacing: normal !important;
    }

    /* Gradiens Szöveg Utilitik */
    .remeny-gradient { background: linear-gradient(90deg, #55ffff, #5555ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
    .mineforum-gradient { background: linear-gradient(90deg, #ffff55, #ffaa00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
    .instagram-gradient { background: linear-gradient(90deg, #ff55ff, #ffaa55); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
    .youtube-gradient { background: linear-gradient(90deg, #ff5555, #ff0000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
    .github-gradient { background: linear-gradient(90deg, #ffffff, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }

    /* Fix Háttér Réteg (PC-n és Mobilon is stabil) */
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        background: linear-gradient(rgba(0, 0, 30, 0.35), rgba(0, 0, 0, 0.78)), url("bg-remeny.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        pointer-events: none;
        transform: translateZ(0);
    }

    @media (max-width: 640px) {
        body::before {
            background: linear-gradient(rgba(0, 0, 30, 0.35), rgba(0, 0, 0, 0.78)), url("bg-remeny-telefon.png");
            background-size: cover;
            background-position: center top;
        }
    }

    /* Kártyák és Buborékok Alapstílusa (iOS26 és Extra Áttetsző Glass ötvözete) */
    .hero-card {
        position: relative;
        max-width: 540px;
        margin: 0 auto;
        border-radius: 30px;
        padding: 1px;
        transition: all 0.25s ease;
    }

    .hero-card-inner {
        border-radius: 28px;
        padding: 28px 22px;
        transition: all 0.25s ease;
    }

    .hero-logo {
        width: min(96vw, 560px);
        max-width: 100%;
        height: auto;
        max-height: 240px;
        margin: 0 auto 22px;
        object-fit: contain;
        image-rendering: pixelated;
        filter: drop-shadow(0 0 10px rgba(85, 255, 255, 0.35)) drop-shadow(0 0 22px rgba(85, 85, 255, 0.18));
    }

    .hero-btn-smp,
    .hero-btn-hytale {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 130px;
        padding: 12px 26px;
        border-radius: 18px;
        font-weight: 900;
        transition: 0.25s ease;
        letter-spacing: 0.05em;
    }

    .hero-btn-smp:hover,
    .hero-btn-hytale:hover {
        transform: translateY(-2px);
    }

    /* --- ÜVEG (GLASS) MÓD --- */
    body.mode-glass .glass-bubble,
    body.mode-glass .hero-card,
    body.mode-glass .hero-btn-smp,
    body.mode-glass .hero-btn-hytale,
    body.mode-glass #server-display,
    body.mode-glass #login-panel {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.012)) !important;
        border: 1px solid rgba(255, 255, 255, 0.22) !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28), inset 0 -1px 0 rgba(255, 255, 255, 0.035), 0 10px 30px rgba(0, 0, 0, 0.18), 0 0 22px rgba(130, 210, 255, 0.07) !important;
        -webkit-backdrop-filter: blur(28px) saturate(210%) !important;
        backdrop-filter: blur(28px) saturate(210%) !important;
    }

    body.mode-glass .hero-card-inner {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.008)) !important;
        border: 1px solid rgba(255, 255, 255, 0.10) !important;
    }

    /* --- MATT MÓD FELÜLBÍRÁLÁSOK --- */
    body.mode-matt .hero-card { border-radius: 10px !important; }
    body.mode-matt .hero-card-inner { border-radius: 8px !important; background: rgba(5, 9, 24, 0.98) !important; }
    body.mode-matt .glass-bubble,
    body.mode-matt .hero-btn-smp,
    body.mode-matt .hero-btn-hytale,
    body.mode-matt #server-display,
    body.mode-matt #login-panel {
        border-radius: 7px !important;
        background: rgba(5, 9, 24, 0.98) !important;
        border: 1px solid rgba(150, 170, 230, 0.14) !important;
        box-shadow: 0 7px 18px rgba(0, 0, 0, 0.28) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
    }

    /* Alsó téma váltó gombok */
    .glass-toggle {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 60;
        display: flex;
        gap: 8px;
    }

    .glass-toggle button {
        min-width: 70px;
        padding: 9px 13px;
        border-radius: 16px;
        font-weight: 900;
        transition: 0.2s ease;
    }

    .glass-toggle button:hover { transform: scale(1.04); }

    /* Minecraft skin megjelenítés */
    .minecraft-avatar-crop {
        background-repeat: no-repeat !important;
        background-size: 800% 800% !important;
        background-position: 14.285% 14.285% !important;
        image-rendering: pixelated;
    }

    /* Szerver Kártya Struktúra */
    #server-display { width: min(92vw, 760px); margin: 0 auto; }
    .server-strip-card { width: 100%; display: flex; align-items: center; gap: 14px; text-align: left; }
    .server-strip-logo { width: 58px; height: 58px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
    .server-strip-main { flex: 1; min-width: 0; }
    .server-strip-title { font-size: 1rem; font-weight: 900; color: white; line-height: 1.1; }
    .server-strip-ip { margin-top: 4px; font-size: 0.75rem; font-weight: 800; color: rgb(103, 232, 249); word-break: break-word; }
    .server-strip-motd { margin-top: 5px; font-size: 0.72rem; line-height: 1.25; color: rgb(134, 239, 172); font-family: monospace; }
    .server-strip-motd .motd-line { display: block; width: 100%; }
    .server-strip-side { flex-shrink: 0; text-align: right; min-width: 82px; }
    .server-strip-online { font-size: 0.9rem; font-weight: 900; color: white; }
    .server-strip-version { margin-top: 4px; font-size: 0.68rem; color: rgb(148, 163, 184); }

    /* Mobil widget elrendezések */
    @media (max-width: 640px) {
        .top-left-widgets {
            position: absolute !important; top: 14px !important; left: 12px !important; right: 12px !important;
            display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 8px !important; z-index: 50 !important;
        }
        .top-left-widgets .top-info-box { width: 100% !important; height: 58px !important; padding: 8px 10px !important; border-radius: 18px !important; }
        #clock-time { font-size: 1.25rem !important; line-height: 1.2rem !important; }
        #clock-date { font-size: 0.78rem !important; line-height: 0.92rem !important; }
        #clock-day { font-size: 0.68rem !important; }
        .top-right-widgets { position: absolute !important; top: 82px !important; right: 12px !important; display: flex !important; gap: 8px !important; z-index: 51 !important; }
        .top-right-widgets .glass-bubble { width: 44px !important; height: 44px !important; border-radius: 16px !important; font-size: 1.35rem !important; padding: 0 !important; }
        #login-panel { top: 136px !important; right: 12px !important; left: 12px !important; width: auto !important; }
        main { padding-top: 140px !important; }
        .hero-card { max-width: 92% !important; }
        .hero-card-inner { padding: 22px 14px !important; }
        .glass-toggle { left: 50%; transform: translateX(-50%); bottom: 10px; }
        .server-strip-card { gap: 10px; }
        .server-strip-logo { width: 50px; height: 50px; border-radius: 10px; }
    }
</style>
