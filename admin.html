<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Szerver Beállítások</title>
</head>
<body>

<h1>Szerver Beállítások</h1>

<label>Szerver típusa:</label>
<select id="serverType" onchange="loadConfig()">
    <option value="smp">SMP</option>
    <option value="hytale">Hytale</option>
</select>

<br><br>

<input id="name" placeholder="Szerver neve">
<input id="ip" placeholder="IP cím">
<input id="port" placeholder="Port">
<input id="logo" placeholder="Logo fájl">

<br><br>

<button onclick="saveConfig()">Mentés</button>

<script>

let allConfigs = {};

async function loadConfig() {
    const response = await fetch("http://localhost:3000/api/server-config");
    allConfigs = await response.json();

    const type = document.getElementById("serverType").value;
    const config = allConfigs[type] || {};

    document.getElementById("name").value = config.name || "";
    document.getElementById("ip").value = config.ip || "";
    document.getElementById("port").value = config.port || 25565;
    document.getElementById("logo").value = config.logo || "logo.png";
}

async function saveConfig() {

    const type = document.getElementById("serverType").value;

    allConfigs[type] = {
        name: document.getElementById("name").value,
        ip: document.getElementById("ip").value,
        port: document.getElementById("port").value,
        logo: document.getElementById("logo").value
    };

    await fetch("http://localhost:3000/api/server-config", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(allConfigs)
    });

    alert("Mentve!");
}

loadConfig();

</script>

</body>
</html>
